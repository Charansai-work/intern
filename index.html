<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>InternHub</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:
radial-gradient(circle at 20% 20%, #0ea5e920 0%, transparent 40%),
radial-gradient(circle at 80% 10%, #38bdf820 0%, transparent 40%),
linear-gradient(135deg,#020617,#020617,#0f172a);
color:white;
}

/* LOGIN */
.loginWrap{display:flex;justify-content:center;align-items:center;height:100vh;}
.card{background:#1e293b;padding:28px;border-radius:18px;width:340px;}
input,select,textarea{
width:100%;padding:12px;margin:10px 0;border-radius:12px;
border:1px solid #334155;background:#020617;color:white;
}
button{
background:linear-gradient(135deg,#38bdf8,#0ea5e9);
border:none;padding:10px;border-radius:12px;color:white;
cursor:pointer;width:100%;
}
.linkBtn{background:none;margin-top:8px;color:#38bdf8}
.error{color:#ff6b6b}

/* LAYOUT */
.container{display:flex;height:100vh;}
.sidebar{
width:250px;background:#020617cc;padding:20px;
border-right:1px solid #1e293b;
display:flex;flex-direction:column;
}
.profileTop{
display:flex;align-items:center;gap:12px;
margin-bottom:25px;border-bottom:1px solid #1e293b;
padding-bottom:15px;
}
.avatar{
width:45px;height:45px;border-radius:50%;
background:#38bdf8;
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}
.menu{padding:10px;border-radius:10px;cursor:pointer;margin-bottom:6px;}
.menu:hover{background:#1e293b;color:#38bdf8;}
.logoutBtn{margin-top:auto;}
.main{flex:1;padding:30px;overflow:auto;}

.cardBox{
background:#1e293bcc;
padding:22px;border-radius:18px;margin-bottom:22px;
}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.stat{background:#0f172a;padding:20px;border-radius:14px;}
.job{background:#0f172a;padding:14px;border-radius:12px;margin-top:10px;}
.bigAvatar{
width:90px;height:90px;border-radius:50%;
background:#38bdf8;
display:flex;align-items:center;justify-content:center;
font-size:34px;margin:auto;margin-bottom:15px;
font-weight:bold;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

/* ================= AUTH ================= */
function Auth({onLogin}){

const [mode,setMode]=React.useState("login");
const [role,setRole]=React.useState("student");
const [name,setName]=React.useState("");
const [email,setEmail]=React.useState("");
const [password,setPassword]=React.useState("");
const [error,setError]=React.useState("");

function reset(){
setName("");setEmail("");setPassword("");setError("");
}

function register(){
if(!name||!email||password.length<4)
return setError("Fill all fields correctly");

localStorage.setItem(
"user_"+email,
JSON.stringify({username:name,email,password,role})
);

alert("Account created ✅");
setMode("login");
reset();
}

function login(){
const saved=localStorage.getItem("user_"+email);
if(!saved) return setError("Account not found");
const user=JSON.parse(saved);
if(user.password!==password) return setError("Wrong password");
onLogin(user);
}

return e("div",{className:"loginWrap"},
e("div",{className:"card"},
e("h2",null,mode==="login"?"InternHub Login":"Create Account"),
error && e("p",{className:"error"},error),

e("select",{value:role,onChange:i=>setRole(i.target.value)},
e("option",{value:"student"},"Student"),
e("option",{value:"admin"},"Admin")
),

e("input",{placeholder:"Name",value:name,onChange:i=>setName(i.target.value)}),
e("input",{placeholder:"Email",value:email,onChange:i=>setEmail(i.target.value)}),
e("input",{type:"password",placeholder:"Password",value:password,onChange:i=>setPassword(i.target.value)}),

mode==="login"
? e("button",{onClick:login},"Login")
: e("button",{onClick:register},"Register"),

e("button",{className:"linkBtn",
onClick:()=>{setMode(mode==="login"?"register":"login");reset();}},
mode==="login"?"Create Account":"Back to Login")
));
}

/* ================= DASHBOARD ================= */
function Dashboard({jobs,apps,user,feedback,addFeedback}){

const myApps=apps.filter(a=>a.email===user.email);
const myFeedback=user.role==="admin"
? feedback
: feedback.filter(f=>f.email===user.email);

const [selected,setSelected]=React.useState("");
const [text,setText]=React.useState("");

return e("div",null,

e("div",{className:"cardBox"},
e("h2",null,"Welcome, "+user.username+" 👋")
),

e("div",{className:"grid"},
e("div",{className:"stat"},"Internships: "+jobs.length),
e("div",{className:"stat"},
user.role==="admin"
? "Total Applications: "+apps.length
: "Your Applications: "+myApps.length),
e("div",{className:"stat"},"Role: "+user.role.toUpperCase())
),

/* ADMIN FEEDBACK */
user.role==="admin" &&
e("div",{className:"cardBox"},
e("h3",null,"Post Feedback"),
e("select",{value:selected,onChange:i=>setSelected(i.target.value)},
e("option",{value:""},"Select Student"),
...apps.map((a,i)=>e("option",{key:i,value:a.email},a.email))
),
e("textarea",{placeholder:"Write feedback...",
value:text,onChange:i=>setText(i.target.value)}),
e("button",{onClick:()=>{
if(!selected||!text.trim()) return;
addFeedback({email:selected,text});
setSelected("");setText("");
}},"Submit Feedback")
),

e("div",{className:"cardBox"},
e("h3",null,"Feedback"),
myFeedback.length===0
? e("p",null,"No feedback yet")
: myFeedback.map((f,i)=>e("div",{className:"job",key:i},f.email+" — "+f.text))
)
);
}

/* INTERNSHIPS */
function Internships({role,jobs,apply,apps,user,addJob}){

const [newJob,setNewJob]=React.useState("");

return e("div",{className:"cardBox"},
e("h3",null,"Internships"),

role==="admin" &&
e("div",null,
e("input",{placeholder:"Post Internship",
value:newJob,onChange:i=>setNewJob(i.target.value)}),
e("button",{onClick:()=>{addJob(newJob);setNewJob("");}},"Post Internship")
),

jobs.map((j,i)=>
e("div",{className:"job",key:i},
j,
role==="student" &&
(apps.some(a=>a.job===j && a.email===user.email)
? e("button",{style:{float:"right",width:"auto",background:"#22c55e"}},"Applied ✓")
: e("button",{style:{float:"right",width:"auto"},onClick:()=>apply(j)},"Apply"))
))
);
}

/* APPLICATIONS */
function Applications({apps,user}){
const list=user.role==="admin"?apps:apps.filter(a=>a.email===user.email);
return e("div",{className:"cardBox"},
e("h3",null,"Applications"),
list.length===0?e("p",null,"No applications yet")
:list.map((a,i)=>e("div",{className:"job",key:i},a.job+" — "+a.email))
);
}

/* PROFILE */
function Profile({user}){
return e("div",{className:"cardBox"},
e("div",{className:"bigAvatar"},user.username[0].toUpperCase()),
e("h2",null,user.username),
e("p",null,user.email),
e("p",null,"Role: "+user.role)
);
}

/* ================= APP ================= */
function App(){

const [logged,setLogged]=React.useState(false);
const [user,setUser]=React.useState(null);
const [tab,setTab]=React.useState("dashboard");

const [jobs,setJobs]=React.useState([
"Frontend Developer Intern",
"Automation Intern",
"React Developer Intern"
]);

const [apps,setApps]=React.useState([]);
const [feedback,setFeedback]=React.useState([]);

function apply(job){
if(apps.some(a=>a.job===job&&a.email===user.email))return;
setApps([...apps,{job,email:user.email}]);
}

function addJob(job){
if(!job.trim())return;
setJobs([...jobs,job]);
}

function addFeedback(f){
setFeedback([...feedback,f]);
}

if(!logged)
return e(Auth,{onLogin:(u)=>{setUser(u);setLogged(true);}});

return e("div",{className:"container"},

e("div",{className:"sidebar"},
e("div",{className:"profileTop"},
e("div",{className:"avatar"},user.username[0].toUpperCase()),
e("div",null,e("b",null,"InternHub"),e("div",null,user.username))
),

e("div",{className:"menu",onClick:()=>setTab("dashboard")},"Dashboard"),
e("div",{className:"menu",onClick:()=>setTab("internships")},"Internships"),
e("div",{className:"menu",onClick:()=>setTab("applications")},"Applications"),
e("div",{className:"menu",onClick:()=>setTab("profile")},"Profile"),

e("button",{className:"logoutBtn",onClick:()=>setLogged(false)},"Logout")
),

e("div",{className:"main"},
tab==="dashboard" && e(Dashboard,{jobs,apps,user,feedback,addFeedback}),
tab==="internships" && e(Internships,{role:user.role,jobs,apply,apps,user,addJob}),
tab==="applications" && e(Applications,{apps,user}),
tab==="profile" && e(Profile,{user})
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
