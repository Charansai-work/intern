<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>InternHub Final</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:radial-gradient(circle at top,#020617,#020617,#0f172a);
}
.glass{
background:rgba(15,23,42,.65);
backdrop-filter:blur(18px);
border:1px solid rgba(56,189,248,.25);
box-shadow:0 10px 40px rgba(0,0,0,.4);
}
.soft-card{border-radius:26px;}
.soft-btn{border-radius:16px;}
.soft-input{border-radius:18px;}
.glow:hover{
transform:translateY(-4px);
box-shadow:0 0 35px rgba(56,189,248,.35);
transition:.3s;
}
</style>
</head>

<body class="text-white">
<div id="root"></div>

<script>
const e = React.createElement;

/* ================= AUTH ================= */
function Auth({onLogin}){

const [mode,setMode]=React.useState("login");
const [role,setRole]=React.useState("student");
const [name,setName]=React.useState("");
const [email,setEmail]=React.useState("");
const [password,setPassword]=React.useState("");

function register(){
if(!name||!email||!password) return alert("Fill all fields");
localStorage.setItem("user_"+email,
JSON.stringify({username:name,email,password,role}));
alert("Account created ✅");
setMode("login");
}

function login(){
const saved=localStorage.getItem("user_"+email);
if(!saved) return alert("User not found");
const user=JSON.parse(saved);
if(user.password!==password) return alert("Wrong password");
onLogin(user);
}

return e("div",{className:"h-screen flex justify-center items-center"},
e("div",{className:"glass soft-card p-10 w-96"},

e("h1",{className:"text-3xl text-center mb-6 font-bold text-cyan-400"},"InternHub"),

e("select",{className:"w-full p-3 mb-3 bg-slate-900 soft-input",
onChange:i=>setRole(i.target.value)},
e("option",{value:"student"},"Student"),
e("option",{value:"admin"},"Admin")
),

mode==="register" &&
e("input",{placeholder:"Name",
className:"w-full p-3 mb-3 bg-slate-900 soft-input",
onChange:i=>setName(i.target.value)}),

e("input",{placeholder:"Email",
className:"w-full p-3 mb-3 bg-slate-900 soft-input",
onChange:i=>setEmail(i.target.value)}),

e("input",{type:"password",placeholder:"Password",
className:"w-full p-3 mb-4 bg-slate-900 soft-input",
onChange:i=>setPassword(i.target.value)}),

mode==="login"
? e("button",{onClick:login,className:"w-full py-3 bg-cyan-500 soft-btn"},"Login")
: e("button",{onClick:register,className:"w-full py-3 bg-cyan-500 soft-btn"},"Register"),

e("p",{className:"text-center mt-4 cursor-pointer text-cyan-400",
onClick:()=>setMode(mode==="login"?"register":"login")},
mode==="login"?"Create Account":"Back to Login")
));
}

/* ================= DASHBOARD ================= */
function Dashboard({jobs,apps,user,feedback,addFeedback}){

const myApps=apps.filter(a=>a.email===user.email);
const myFeedback=user.role==="admin"
?feedback
:feedback.filter(f=>f.email===user.email);

const [selected,setSelected]=React.useState("");
const [text,setText]=React.useState("");

return e("div",{className:"p-8"},

e("h2",{className:"text-3xl mb-8"},"Welcome "+user.username+" 👋"),

e("div",{className:"grid grid-cols-3 gap-6 mb-8"},
e("div",{className:"glass soft-card p-6"},"Internships: "+jobs.length),
e("div",{className:"glass soft-card p-6"},
user.role==="admin"
?"Total Applications: "+apps.length
:"Your Applications: "+myApps.length),
e("div",{className:"glass soft-card p-6"},
"Role: "+user.role.toUpperCase())
),

user.role==="admin" &&
e("div",{className:"glass soft-card p-6 mb-6"},
e("h3",{className:"mb-3"},"Give Feedback"),

e("select",{className:"w-full p-3 bg-slate-900 soft-input mb-3",
onChange:i=>setSelected(i.target.value)},
e("option",{value:""},"Select Student"),
...apps.map((a,i)=>e("option",{key:i,value:a.email},a.email))
),

e("textarea",{placeholder:"Write feedback...",
className:"w-full p-3 bg-slate-900 soft-input mb-3",
onChange:i=>setText(i.target.value)}),

e("button",{className:"bg-cyan-500 px-6 soft-btn",
onClick:()=>{
if(!selected||!text) return;
addFeedback({email:selected,text});
setText("");
}},
"Submit")
),

e("div",{className:"glass soft-card p-6"},
e("h3",{className:"mb-3"},"Feedback"),
myFeedback.length===0
? e("p",null,"No feedback yet")
: myFeedback.map((f,i)=>
e("div",{key:i,className:"bg-slate-900 p-3 rounded-xl mb-2"},
f.email+" — "+f.text))
)
);
}

/* ================= INTERNSHIPS ================= */
function Internships({user,jobs,setJobs,apps,setApps}){

const [newJob,setNewJob]=React.useState("");

function apply(job){
if(apps.some(a=>a.job===job&&a.email===user.email)) return;
setApps([...apps,{
job,
email:user.email,
status:"Applied",
progress:30
}]);
}

return e("div",{className:"p-8"},

e("h2",{className:"text-2xl mb-6"},"Internships"),

user.role==="admin" &&
e("div",{className:"flex gap-3 mb-6"},
e("input",{placeholder:"Post Internship",
className:"flex-1 p-3 bg-slate-900 soft-input",
onChange:i=>setNewJob(i.target.value)}),
e("button",{className:"bg-cyan-500 px-6 soft-btn",
onClick:()=>{if(newJob)setJobs([...jobs,newJob]);}},
"Post")
),

jobs.map(j=>
e("div",{className:"glass soft-card glow p-4 mb-3 flex justify-between"},
j,
user.role==="student" &&
(apps.some(a=>a.job===j&&a.email===user.email)
? e("span",{className:"text-green-400"},"Applied ✓")
: e("button",{className:"bg-cyan-500 px-4 soft-btn",
onClick:()=>apply(j)},"Apply"))
)
));
}

/* ================= APPLICATIONS WITH TRACKING ================= */
function Applications({apps,user,setApps}){

const statusMap={
"Applied":30,
"Under Review":60,
"Shortlisted":80,
"Selected":100
};

function updateStatus(index,newStatus){
const updated=[...apps];
updated[index].status=newStatus;
updated[index].progress=statusMap[newStatus];
setApps(updated);
}

const list=user.role==="admin"
?apps
:apps.filter(a=>a.email===user.email);

return e("div",{className:"p-8"},

e("h2",{className:"text-2xl mb-6"},"Applications"),

list.map((a,i)=>
e("div",{key:i,className:"glass soft-card p-5 mb-5"},

e("p",{className:"font-semibold"},a.job+" — "+a.email),

e("div",{className:"w-full bg-slate-800 h-3 rounded-full mt-3"},
e("div",{style:{width:a.progress+"%"},
className:"h-3 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full"})
),

e("p",{className:"text-sm mt-2 text-cyan-300"},
"Status: "+a.status+" ("+a.progress+"%)"),

user.role==="admin" &&
e("select",{className:"mt-3 p-2 bg-slate-900 soft-input",
onChange:i=>updateStatus(i.target.value?i.target.selectedIndex-1:i,i.target.value)},
["Applied","Under Review","Shortlisted","Selected"]
.map(s=>e("option",{value:s},s)))
))
);
}

/* ================= APP ================= */
function App(){

const [user,setUser]=React.useState(null);
const [tab,setTab]=React.useState("dashboard");

const [jobs,setJobs]=React.useState([
"Frontend Developer Intern",
"Automation Intern",
"React Developer Intern"
]);

const [apps,setApps]=React.useState([]);
const [feedback,setFeedback]=React.useState([]);

function addFeedback(f){
setFeedback([...feedback,f]);
}

if(!user) return e(Auth,{onLogin:setUser});

return e("div",{className:"flex h-screen"},

e("div",{className:"w-64 p-6 flex flex-col bg-slate-950 border-r border-slate-800"},
e("h1",{className:"text-xl font-bold mb-10 text-cyan-400"},"InternHub"),

["dashboard","internships","applications"].map(t =>
e("div",{key:t,onClick:()=>setTab(t),
className:"p-3 mb-2 cursor-pointer rounded-xl hover:bg-slate-800 capitalize"},t)
),

e("button",{className:"mt-auto bg-red-500 py-2 soft-btn",
onClick:()=>setUser(null)},"Logout")
),

e("div",{className:"flex-1 overflow-auto"},
tab==="dashboard" && e(Dashboard,{jobs,apps,user,feedback,addFeedback}),
tab==="internships" && e(Internships,{user,jobs,setJobs,apps,setApps}),
tab==="applications" && e(Applications,{apps,user,setApps})
)
);
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
